<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONS Offline</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #0a246a 0%, #1a3a8a 100%);
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            color: #333;
        }
        button {
            background: #0a246a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Você está offline</h1>
        <p>Parece que você perdeu a conexão com a internet.</p>
        <p>Os dados salvos localmente ainda estão disponíveis quando você reconectar.</p>
        <button onclick="location.reload()">Tentar novamente</button>
    </div>
</body>
</html>
